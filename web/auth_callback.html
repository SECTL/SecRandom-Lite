<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SECTL Callback Redirect</title>
</head>
<body>
  <script>
    function decodeStatePayload(state) {
      const normalized = state.replace(/-/g, '+').replace(/_/g, '/');
      const padded = normalized + '='.repeat((4 - normalized.length % 4) % 4);
      return JSON.parse(atob(padded));
    }

    (function main() {
      const currentUrl = new URL(window.location.href);
      const state = currentUrl.searchParams.get('state');
      let targetPath = '/auth_callback_web.html';

      if (state) {
        try {
          const payload = decodeStatePayload(state);
          if (payload.t === 'android') {
            targetPath = '/auth_callback_android.html';
          } else if (payload.t === 'windows' || payload.t === 'desktop') {
            targetPath = '/auth_callback_windows.html';
          }
        } catch (_) {
          // Keep default web callback.
        }
      }

      const targetUrl = `${window.location.origin}${targetPath}${window.location.search}`;
      window.location.replace(targetUrl);
    })();
  </script>
</body>
</html>
