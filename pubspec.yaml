name: secrandom_lite
description: "基于 Material Design 3 的随机点名应用。"
publish_to: 'none'
version: 0.0.10+10

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  animations: ^2.0.11
  uuid: ^4.3.3
  path_provider: ^2.1.2
  path: ^1.9.0
  universal_html: ^2.0.0
  url_launcher: ^6.2.1
  http: ^1.2.0
  crypto: ^3.0.6
  flutter_secure_storage: ^9.0.0
  app_links: ^6.3.2
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true
